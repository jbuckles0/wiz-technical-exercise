name: "App Pipeline — Build, Scan & Deploy"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tasky-main/**"
      - "k8s/**"
  pull_request:
    branches: [main]
    paths:
      - "tasky-main/**"

env:
  AWS_REGION:     "us-east-1"
  ECR_REPOSITORY: "tasky"
  EKS_CLUSTER:    "wiz-demo-cluster"
  K8S_NAMESPACE:  "wiz-exercise"
  TF_VERSION:     "1.7.0"

jobs:
  #  Stage 1: Trivy Container Security Scan 
  trivy-scan:
    name: "Trivy — Container Image Scan"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t tasky:scan tasky-main/

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "tasky:scan"
          format:       "sarif"
          output:       "trivy-results.sarif"
          severity:     "CRITICAL,HIGH"
          # Don't fail build — findings are intentional (outdated base image for demo)
          exit-code:    "0"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category:   trivy-container

  #  Stage 2: Build & Push to ECR (main branch only) 
  build-push:
    name: "Build & Push to ECR"
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ steps.meta.outputs.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            tasky-main/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "Pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  #  Stage 3: Deploy to EKS 
  deploy:
    name: "Deploy to EKS"
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Ensure namespace and RBAC
        run: kubectl apply -f k8s/namespace.yaml -f k8s/rbac.yaml

      # Read the MongoDB VM private IP directly from Terraform state.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false  
          
      - name: Get MongoDB URI from Terraform state
        id: tfout
        working-directory: terraform/
        env:
          TF_VAR_mongo_admin_password: ${{ secrets.MONGO_ADMIN_PASSWORD }}
          TF_VAR_mongo_app_password:   ${{ secrets.MONGO_APP_PASSWORD }}
        run: |
          terraform init -input=false -reconfigure
          MONGO_IP=$(terraform output -raw mongo_vm_private_ip)
          echo "Resolved MongoDB private IP: $MONGO_IP"
          # Construct the URI using the app password from secrets (never the admin password)
          MONGODB_URI="mongodb://taskyuser:${{ secrets.MONGO_APP_PASSWORD }}@${MONGO_IP}:27017/tasky?authSource=tasky"
          echo "mongodb_uri=${MONGODB_URI}" >> $GITHUB_OUTPUT

      - name: Upsert Kubernetes Secret
        env:
          MONGODB_URI: ${{ steps.tfout.outputs.mongodb_uri }}
          SECRET_KEY:  ${{ secrets.TASKY_SECRET_KEY }}
        run: |
          kubectl create secret generic tasky-secrets \
            --from-literal=MONGODB_URI="${MONGODB_URI}" \
            --from-literal=SECRET_KEY="${SECRET_KEY}" \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy application
        env:
          ECR_REGISTRY: ${{ needs.build-push.outputs.ecr-registry }}
          IMAGE_TAG:    ${{ needs.build-push.outputs.image-tag }}
        run: |
          sed "s|REGISTRY_URL|$ECR_REGISTRY|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl rollout restart deployment/tasky -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/tasky -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Print application URL
        run: |
          echo "Waiting for ALB to be assigned (can take 2-3 minutes)..."
          for i in $(seq 1 20); do
            HOSTNAME=$(kubectl get ingress tasky -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$HOSTNAME" ]; then
              echo ""
              echo "✅ Application is live at: http://$HOSTNAME"
              exit 0
            fi
            echo "  Attempt $i/20 — ALB not ready yet, retrying in 15s..."
            sleep 15
          done
          echo "⚠️  ALB hostname not assigned after 5 minutes — check AWS console"
          kubectl describe ingress tasky -n ${{ env.K8S_NAMESPACE }}
          exit 1
