# This is a TEMPLATE. The CI/CD pipeline populates real values via:
#   kubectl create secret generic tasky-secrets \
#     --from-literal=MONGODB_URI="mongodb://taskyuser:PASSWORD@PRIVATE_IP:27017/tasky?authSource=tasky" \
#     --from-literal=SECRET_KEY="your-jwt-secret" \
#     --namespace wiz-exercise \
#     --dry-run=client -o yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: tasky-secrets
  namespace: wiz-exercise
type: Opaque
stringData:
  MONGODB_URI: "POPULATED_BY_CI_CD"
  SECRET_KEY:  "POPULATED_BY_CI_CD"
